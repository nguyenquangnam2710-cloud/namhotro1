name: Build APK from ZIP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install unzip
        run: sudo apt-get update -y && sudo apt-get install -y unzip

      - name: Find zip & unzip
        run: |
          ls -la
          ZIP="$(ls -1 *.zip 2>/dev/null | head -n 1)"
          if [ -z "$ZIP" ]; then
            echo "Không tìm thấy file .zip ở root repo"
            exit 1
          fi
          echo "ZIP=$ZIP"
          rm -rf project
          mkdir -p project
          unzip -q "$ZIP" -d project
          echo "Top folders:"
          find project -maxdepth 2 -type d -print

      - name: Build debug APK (auto-detect gradlew dir)
        run: |
          ROOT="$(find project -maxdepth 8 -type f -name gradlew -print -quit | sed 's|/gradlew$||')"
          if [ -z "$ROOT" ]; then
            echo "Không tìm thấy gradlew trong zip sau khi giải nén"
            exit 1
          fi
          echo "Detected ROOT=$ROOT"
          chmod +x "$ROOT/gradlew"
          cd "$ROOT"
          ./gradlew :app:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: project/**/app/build/outputs/apk/debug/*.apk
