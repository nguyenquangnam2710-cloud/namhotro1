name: Build APK from ZIP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install unzip
        run: sudo apt-get update -y && sudo apt-get install -y unzip

      - name: Unzip project
        run: |
          rm -rf project
          mkdir -p project
          unzip -q "hỗ trợ v1.zip" -d project
          ls -la project

      - name: Detect root (find gradlew)
        run: |
          ROOT="$(find project -maxdepth 4 -type f -name gradlew -print -quit | xargs -r dirname)"
          echo "ROOT=$ROOT" >> $GITHUB_ENV
          echo "Detected ROOT=$ROOT"
          ls -la "$ROOT" || true

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Grant gradlew execute
        run: chmod +x "$ROOT/gradlew"

      - name: Build debug APK
        run: |
          cd "$ROOT"
          ./gradlew :app:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: ${{ env.ROOT }}/app/build/outputs/apk/debug/*.apk
