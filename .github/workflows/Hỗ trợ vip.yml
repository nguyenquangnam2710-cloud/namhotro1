name: Build APK from ZIP (OpenCV + MP40 full optimize)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y unzip dos2unix curl rsync

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: |
          sdkmanager "platforms;android-33" "build-tools;33.0.0"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"

      - name: Find zip & unzip
        id: unzip
        run: |
          set -euo pipefail
          ZIP="$(find . -maxdepth 1 -type f -name '*.zip' -print -quit)"
          if [ -z "${ZIP:-}" ]; then
            echo "Không tìm thấy file .zip ở root repo"
            exit 1
          fi

          rm -rf project
          mkdir -p project
          unzip -q "$ZIP" -d project

          ROOT="$(find project -maxdepth 10 -type f -name gradlew -print -quit | sed 's|/gradlew$||')"
          if [ -z "${ROOT:-}" ]; then
            echo "Không tìm thấy gradlew trong zip sau khi giải nén"
            exit 1
          fi

          dos2unix "$ROOT/gradlew" || true
          chmod +x "$ROOT/gradlew"
          echo "root_dir=$ROOT" >> "$GITHUB_OUTPUT"

      - name: Force settings.gradle to only include :app
        working-directory: ${{ steps.unzip.outputs.root_dir }}
        run: |
          set -euo pipefail
          ROOT_NAME_LINE=""
          if [ -f settings.gradle ]; then
            ROOT_NAME_LINE="$(grep -E '^[[:space:]]*rootProject\.name[[:space:]]*=' settings.gradle || true)"
          fi
          echo "include ':app'" > settings.gradle
          if [ -n "${ROOT_NAME_LINE:-}" ]; then
            echo "$ROOT_NAME_LINE" >> settings.gradle
          fi

      - name: Remove any :opencv dependency lines from app/build.gradle
        working-directory: ${{ steps.unzip.outputs.root_dir }}
        run: |
          set -euo pipefail
          if [ -f app/build.gradle ]; then
            sed -i \
              -e "/project\\(':opencv'\\)/d" \
              -e "/project\\(path:[[:space:]]*\":opencv\"/d" \
              -e "/findProject\\(':opencv'\\)/d" \
              -e "/opencvProject/d" \
              app/build.gradle || true

            sed -i "/implementation[[:space:]]*['\"]com\.quickbirdstudios:opencv:.*['\"]/d" app/build.gradle
            sed -i "/implementation[[:space:]]*files(['\"]libs\/opencv.*['\"])/d" app/build.gradle || true
          fi

      - name: Download OpenCV SDK and inject sources + resources + native libs into app
        working-directory: ${{ steps.unzip.outputs.root_dir }}
        run: |
          set -euo pipefail

          curl -fL "https://github.com/opencv/opencv/releases/download/4.13.0/opencv-4.13.0-android-sdk.zip" -o opencv.zip
          rm -rf /tmp/opencv
          mkdir -p /tmp/opencv
          unzip -q opencv.zip -d /tmp/opencv

          OPENCV_SDK="$(find /tmp/opencv -maxdepth 6 -type d -path '*/OpenCV-android-sdk/sdk' -print -quit)"
          if [ -z "${OPENCV_SDK:-}" ]; then
            echo "Không tìm thấy OpenCV-android-sdk/sdk trong zip"
            find /tmp/opencv -maxdepth 4 -type d -print || true
            exit 1
          fi

          SRC_DIR="$OPENCV_SDK/java/src"
          RES_DIR="$OPENCV_SDK/java/res"

          if [ ! -d "$SRC_DIR" ]; then
            echo "Không tìm thấy sdk/java/src"
            find "$OPENCV_SDK/java" -maxdepth 4 -type d -print || true
            exit 1
          fi

          if [ ! -d "$RES_DIR" ]; then
            echo "Không tìm thấy sdk/java/res"
            find "$OPENCV_SDK/java" -maxdepth 4 -type d -print || true
            exit 1
          fi

          if [ ! -d "$OPENCV_SDK/native/libs" ]; then
            echo "Không tìm thấy sdk/native/libs"
            find "$OPENCV_SDK/native" -maxdepth 4 -type d -print || true
            exit 1
          fi

          mkdir -p app/src/main/java
          mkdir -p app/src/main/res
          mkdir -p app/src/main/jniLibs

          rsync -a "$SRC_DIR/" app/src/main/java/
          rsync -a "$RES_DIR/" app/src/main/res/
          rsync -a "$OPENCV_SDK/native/libs/" app/src/main/jniLibs/

          APP_PKG="$(sed -n 's/.*package="\([^"]*\)".*/\1/p' app/src/main/AndroidManifest.xml | head -n 1)"
          if [ -z "${APP_PKG:-}" ]; then
            echo "Không đọc được package từ app/src/main/AndroidManifest.xml"
            exit 1
          fi

          grep -rl "org.opencv.R" app/src/main/java/org/opencv/android | xargs -r sed -i "s/org\.opencv\.R/${APP_PKG}.R/g"
          grep -rl "org.opencv.BuildConfig" app/src/main/java/org/opencv/android | xargs -r sed -i "s/org\.opencv\.BuildConfig/${APP_PKG}.BuildConfig/g"

      - name: Fix gradle.properties (AndroidX)
        working-directory: ${{ steps.unzip.outputs.root_dir }}
        run: |
          set -euo pipefail
          touch gradle.properties

          sed -i \
            -e '/^android\.useAndroidX=/d' \
            -e '/^android\.enableJetifier=/d' \
            -e '/^android\.suppressUnsupportedCompileSdk=/d' \
            gradle.properties

          printf '\n' >> gradle.properties
          {
            echo 'android.useAndroidX=true'
            echo 'android.enableJetifier=true'
            echo 'android.suppressUnsupportedCompileSdk=33'
          } >> gradle.properties

      - name: Fix XML files – remove BOM and leading blank lines
        working-directory: ${{ steps.unzip.outputs.root_dir }}
        run: |
          find app/src/main/res -type f -name "*.xml" -exec perl -i -0777 -pe '
            s/^\xEF\xBB\xBF//;
            s/\A\s*//;
            s/\A(<\?xml\b[^>]*\?>\s*)//i;
            $_ = "<?xml version=\"1.0\" encoding=\"utf-8\"?>\n" . $_ if /\A(?!<\?xml)/;
          ' {} \;

      - name: Fix Java – bad operand type int for !
        working-directory: ${{ steps.unzip.outputs.root_dir }}
        run: |
          sed -i "s/!Shizuku\.checkSelfPermission()/Shizuku.checkSelfPermission() != 0/g" app/src/main/java/com/assistive/filter/FullRedModeService.java

      - name: Fix Java – import and create SystemTunerService if missing
        working-directory: ${{ steps.unzip.outputs.root_dir }}
        run: |
          FILE="app/src/main/java/com/assistive/filter/MainActivity.java"
          if [ -f "$FILE" ]; then
            if ! grep -q "import com.assistive.filter.SystemTunerService;" "$FILE"; then
              sed -i "/^package/a import com.assistive.filter.SystemTunerService;" "$FILE"
            fi
          fi
          STUB="app/src/main/java/com/assistive/filter/SystemTunerService.java"
          if [ ! -f "$STUB" ]; then
            mkdir -p "$(dirname "$STUB")"
            echo "package com.assistive.filter;" > "$STUB"
            echo "public class SystemTunerService extends android.app.Service {" >> "$STUB"
            echo "  public android.os.IBinder onBind(android.content.Intent intent) { return null; }" >> "$STUB"
            echo "}" >> "$STUB"
          fi

      - name: Create AimController.java with aiming algorithm
        working-directory: ${{ steps.unzip.outputs.root_dir }}
        run: |
          mkdir -p app/src/main/java/com/assistive/filter
          cat > app/src/main/java/com/assistive/filter/AimController.java <<'EOF'
          package com.assistive.filter;

          import android.util.Log;
          import java.io.IOException;

          public class AimController {
              private static final String TAG = "AimController";

              public static float[] computeSwipeVelocity(int enemyState, int enemyDirection, int deltaY) {
                  float Vx, Vy;
                  Vy = 7550f + 10f * deltaY;
                  int enemySpeed;
                  switch (enemyState) {
                      case 2: enemySpeed = 26; break;
                      case 1: enemySpeed = 18; break;
                      default: enemySpeed = 0;
                  }
                  Vx = enemyDirection * enemySpeed * 10f;
                  return new float[]{Vx, Vy};
              }

              public static void performAimSwipe(int durationMs, float Vx, float Vy, float startX, float startY) {
                  float endX = startX + Vx * (durationMs / 1000f);
                  float endY = startY - Vy * (durationMs / 1000f);
                  String cmd = "input swipe " + (int)startX + " " + (int)startY + " "
                          + (int)endX + " " + (int)endY + " " + durationMs;
                  try {
                      Runtime.getRuntime().exec(new String[]{"su", "-c", cmd}).waitFor();
                      Log.d(TAG, "Aim swipe executed");
                  } catch (Exception e) {
                      Log.e(TAG, "Swipe failed", e);
                  }
              }

              public static void applySystemOptimizations() {
                  String[] commands = {
                      "settings put system peak_refresh_rate 120",
                      "settings put system min_refresh_rate 120",
                      "settings put global window_animation_scale 0",
                      "settings put global transition_animation_scale 0",
                      "settings put global animator_duration_scale 0",
                      "settings put system pointer_speed 7",
                      "settings put system view.touch_slop 0",
                      "settings put global private_dns_mode hostname",
                      "settings put global private_dns_specifier 1.1.1.1.cloudflare-dns.com",
                      "wm size 720x1600",
                      "wm density 560"
                  };
                  for (String cmd : commands) {
                      try {
                          Runtime.getRuntime().exec(new String[]{"su", "-c", cmd});
                      } catch (IOException ignored) {
                          Log.w(TAG, "Failed to run: " + cmd);
                      }
                  }
              }
          }
          EOF

      - name: Replace MainActivity.java with full version (including MP40)
        working-directory: ${{ steps.unzip.outputs.root_dir }}
        run: |
          mkdir -p app/src/main/java/com/assistive/filter
          cat > app/src/main/java/com/assistive/filter/MainActivity.java <<'EOF'
          package com.assistive.filter;

          import android.Manifest;
          import android.app.Activity;
          import android.app.AlertDialog;
          import android.content.Context;
          import android.content.DialogInterface;
          import android.content.Intent;
          import android.content.SharedPreferences;
          import android.content.pm.PackageManager;
          import android.net.Uri;
          import android.os.Build;
          import android.os.Bundle;
          import android.provider.Settings;
          import android.text.InputType;
          import android.util.Log;
          import android.view.View;
          import android.view.inputmethod.InputMethodManager;
          import android.widget.Button;
          import android.widget.EditText;
          import android.widget.Toast;

          import rikka.shizuku.Shizuku;

          public final class MainActivity extends Activity {
              private static final int REQ_SHIZUKU = 10001;
              private static final int REQ_NOTIF = 10;
              private static final int REQ_LENS_CAPTURE = 20002;
              private static final int REQ_PICK_PRIORITY = 30001;

              private static final String PREFS = "assistive_prefs";
              private static final String KEY_POINTER_SPEED = "pointer_speed";
              private static final String KEY_PRIORITY_PATHS = "priority_paths";
              private static final String KEY_PRIORITY_WEIGHT_PREFIX = "priority_w_";

              private Button btnPointerSpeed;
              private Button btnApiToggle;
              private Button btnApiKey;

              private int lensResultCode;
              private Intent lensResultData;

              private final Shizuku.OnRequestPermissionResultListener shizukuPermListener =
                  new Shizuku.OnRequestPermissionResultListener() {
                      @Override
                      public void onRequestPermissionResult(int requestCode, int grantResult) {
                          if (grantResult == PackageManager.PERMISSION_GRANTED) {
                              Toast.makeText(MainActivity.this, "Đã cấp quyền Shizuku", Toast.LENGTH_SHORT).show();
                              try { ShizukuPointerSpeedController.connect(MainActivity.this); } catch (Throwable ignore) {}
                              try { ShizukuDpiController.connect(MainActivity.this); } catch (Throwable ignore) {}
                          } else {
                              Toast.makeText(MainActivity.this, "Bạn chưa cấp quyền Shizuku", Toast.LENGTH_SHORT).show();
                          }
                          updatePointerSpeedText();
                      }
                  };

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);

                  try {
                      Shizuku.addRequestPermissionResultListener(shizukuPermListener);
                  } catch (Throwable ignore) {}

                  if (Build.VERSION.SDK_INT >= 33) {
                      requestPermissions(new String[]{Manifest.permission.POST_NOTIFICATIONS}, REQ_NOTIF);
                  }

                  Button btnOverlay = findViewById(R.id.btnOverlay);
                  Button btnStart = findViewById(R.id.btnStart);
                  Button btnEdit = findViewById(R.id.btnEdit);
                  Button btnStop = findViewById(R.id.btnStop);
                  Button btnShizuku = findViewById(R.id.btnShizuku);
                  btnPointerSpeed = findViewById(R.id.btnPointerSpeed);
                  Button btnScreenSensitivity = findViewById(R.id.btnScreenSensitivity);
                  Button btnXSensitivity = findViewById(R.id.btnXSensitivity);
                  Button btnHeightPlus20 = findViewById(R.id.btnHeightPlus20);
                  Button btnHeightMinus20 = findViewById(R.id.btnHeightMinus20);
                  Button btnReduceLag = findViewById(R.id.btnReduceLag);
                  Button btnEnhanceLens = findViewById(R.id.btnEnhanceLens);
                  Button btnLensEdit = findViewById(R.id.btnLensEdit);
                  btnApiToggle = findViewById(R.id.btnApiToggle);
                  btnApiKey = findViewById(R.id.btnApiKey);
                  Button btnDpi1 = findViewById(R.id.btnDpi1);
                  Button btnDpi2 = findViewById(R.id.btnDpi2);
                  Button btnDpi3 = findViewById(R.id.btnDpi3);
                  Button btnDpi4 = findViewById(R.id.btnDpi4);
                  Button btnDpi5 = findViewById(R.id.btnDpi5);
                  Button btnDpi6 = findViewById(R.id.btnDpi6);
                  Button btnDpi7 = findViewById(R.id.btnDpi7);
                  Button btnDpi8 = findViewById(R.id.btnDpi8);
                  Button btnDpi9 = findViewById(R.id.btnDpi9);
                  Button btnDpi10 = findViewById(R.id.btnDpi10);
                  Button btnPickPriority = findViewById(R.id.btnPickPriority);
                  Button btnFloatingControl = findViewById(R.id.btnFloatingControl);
                  Button btnMovableAim = findViewById(R.id.btnMovableAim);
                  Button btnSystemTuner = findViewById(R.id.btnSystemTuner);
                  Button btnFullRed = findViewById(R.id.btnFullRed);
                  Button btnMP40 = findViewById(R.id.btnMP40);

                  btnFloatingControl.setOnClickListener(new View.OnClickListener() {
                      @Override
                      public void onClick(View v) {
                          Intent i = new Intent(MainActivity.this, FloatingControlService.class);
                          if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) startForegroundService(i);
                          else startService(i);
                          Toast.makeText(MainActivity.this, "Đã bật nút nổi", Toast.LENGTH_SHORT).show();
                      }
                  });

                  btnMovableAim.setOnClickListener(new View.OnClickListener() {
                      @Override
                      public void onClick(View v) {
                          Intent i = new Intent(MainActivity.this, MovableAimButtonService.class);
                          if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) startForegroundService(i);
                          else startService(i);
                          Toast.makeText(MainActivity.this, "Đã bật nút aim di động", Toast.LENGTH_SHORT).show();
                      }
                  });

                  btnSystemTuner.setOnClickListener(new View.OnClickListener() {
                      @Override
                      public void onClick(View v) {
                          Intent i = new Intent(MainActivity.this, SystemTunerService.class);
                          if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) startForegroundService(i);
                          else startService(i);
                          Toast.makeText(MainActivity.this, "Đã bật nút tối ưu hệ thống", Toast.LENGTH_SHORT).show();
                      }
                  });

                  btnFullRed.setOnClickListener(new View.OnClickListener() {
                      @Override
                      public void onClick(View v) {
                          Intent i = new Intent(MainActivity.this, FullRedModeService.class);
                          if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) startForegroundService(i);
                          else startService(i);
                          Toast.makeText(MainActivity.this, "🔥 Đã bật Full Red Mode 🔥", Toast.LENGTH_SHORT).show();
                      }
                  });

                  btnMP40.setOnClickListener(new View.OnClickListener() {
                      @Override
                      public void onClick(View v) {
                          if (!ensureAllPermissions()) return;
                          executeMP40Optimizations();
                      }
                  });

                  btnOverlay.setOnClickListener(new View.OnClickListener() {
                      @Override public void onClick(View v) { openOverlaySettings(); }
                  });
                  btnStart.setOnClickListener(new View.OnClickListener() {
                      @Override public void onClick(View v) {
                          if (!ensureAllPermissions()) return;
                          startSvc(filteroverlayservice.ACTION_START_LOCKED);
                      }
                  });
                  btnEdit.setOnClickListener(new View.OnClickListener() {
                      @Override public void onClick(View v) {
                          if (!ensureAllPermissions()) return;
                          startSvc(filteroverlayservice.ACTION_START_EDIT);
                      }
                  });
                  btnStop.setOnClickListener(new View.OnClickListener() {
                      @Override public void onClick(View v) {
                          Intent i = new Intent(MainActivity.this, filteroverlayservice.class);
                          i.setAction(filteroverlayservice.ACTION_STOP);
                          startService(i);
                      }
                  });
                  btnShizuku.setOnClickListener(new View.OnClickListener() {
                      @Override public void onClick(View v) { connectShizuku(); }
                  });
