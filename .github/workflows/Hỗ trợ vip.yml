      - name: Download Gradle 7.0.2
        id: gradle
        run: |
          set -euo pipefail
          VER="7.0.2"
          URL="https://services.gradle.org/distributions/gradle-${VER}-bin.zip"
          curl -L "$URL" -o gradle.zip
          rm -rf /tmp/gradle-dist
          mkdir -p /tmp/gradle-dist
          unzip -q gradle.zip -d /tmp/gradle-dist
          GRADLE_BIN="$(find /tmp/gradle-dist -maxdepth 3 -type f -path '*/bin/gradle' -print -quit)"
          chmod +x "$GRADLE_BIN"
          echo "gradle_bin=$GRADLE_BIN" >> "$GITHUB_OUTPUT"

      - name: Build debug APK (force repos, no wrapper)
        working-directory: ${{ steps.unzip.outputs.root_dir }}
        run: |
          set -euo pipefail

          rm -f local.properties
          echo "sdk.dir=$ANDROID_HOME" > local.properties

          cat > /tmp/init.gradle <<'EOF'
          gradle.beforeProject { p ->
            p.buildscript.repositories.clear()
            p.buildscript.repositories {
              google()
              mavenCentral()
              maven { url "https://jitpack.io" }
            }
            p.repositories.clear()
            p.repositories {
              google()
              mavenCentral()
              maven { url "https://jitpack.io" }
            }
          }
          EOF

          set -o pipefail
          "${{ steps.gradle.outputs.gradle_bin }}" -I /tmp/init.gradle --no-daemon --stacktrace --info ":app:assembleDebug" 2>&1 | tee /tmp/gradle_build.log

      - name: Debug APK location
        if: always()
        working-directory: ${{ steps.unzip.outputs.root_dir }}
        run: |
          echo "=== Cây thư mục app/build/outputs ==="
          tree app/build/outputs || true
          echo "=== Danh sách file APK ==="
          find . -type f -name "*.apk" -print || true
          mkdir -p /tmp/debug-output
          find . -type f -name "*.apk" -print > /tmp/debug-output/apk-paths.txt
          tree app/build/outputs > /tmp/debug-output/tree.txt 2>/dev/null || true

      - name: Upload debug APK location
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk-location
          path: /tmp/debug-output/

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          path: /tmp/gradle_build.log

      - name: Find APK and upload
        id: find_apk
        run: |
          set -euo pipefail
          # Ưu tiên tìm APK debug, bỏ qua unaligned
          APK="$(find project -type f -name '*.apk' -not -path '*/unaligned/*' -print -quit)"
          if [ -z "${APK:-}" ]; then
            echo "Không tìm thấy APK"
            find project -type f -name '*.apk' -print || true
            exit 1
          fi
          echo "apk_path=$APK" >> "$GITHUB_OUTPUT"

      - name: Upload APK
        if: steps.find_apk.outputs.apk_path != ''
        uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: ${{ steps.find_apk.outputs.apk_path }}
