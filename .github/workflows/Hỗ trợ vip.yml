name: Build APK from ZIP (OpenCV source inject)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y unzip dos2unix curl rsync

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: |
          sdkmanager "platforms;android-33" "build-tools;33.0.0"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"

      - name: Find zip & unzip
        id: unzip
        run: |
          set -euo pipefail
          ZIP="$(find . -maxdepth 1 -type f -name '*.zip' -print -quit)"
          if [ -z "${ZIP:-}" ]; then
            echo "Không tìm thấy file .zip ở root repo"
            exit 1
          fi

          rm -rf project
          mkdir -p project
          unzip -q "$ZIP" -d project

          ROOT="$(find project -maxdepth 10 -type f -name gradlew -print -quit | sed 's|/gradlew$||')"
          if [ -z "${ROOT:-}" ]; then
            echo "Không tìm thấy gradlew trong zip sau khi giải nén"
            exit 1
          fi

          dos2unix "$ROOT/gradlew" || true
          chmod +x "$ROOT/gradlew"
          echo "root_dir=$ROOT" >> "$GITHUB_OUTPUT"

      - name: Force settings.gradle to only include :app
        working-directory: ${{ steps.unzip.outputs.root_dir }}
        run: |
          set -euo pipefail
          ROOT_NAME_LINE=""
          if [ -f settings.gradle ]; then
            ROOT_NAME_LINE="$(grep -E '^[[:space:]]*rootProject\.name[[:space:]]*=' settings.gradle || true)"
          fi
          echo "include ':app'" > settings.gradle
          if [ -n "${ROOT_NAME_LINE:-}" ]; then
            echo "$ROOT_NAME_LINE" >> settings.gradle
          fi

      - name: Remove any :opencv dependency lines from app/build.gradle
        working-directory: ${{ steps.unzip.outputs.root_dir }}
        run: |
          set -euo pipefail
          if [ -f app/build.gradle ]; then
            sed -i \
              -e "/project\\(':opencv'\\)/d" \
              -e "/project\\(path:[[:space:]]*\":opencv\"/d" \
              -e "/findProject\\(':opencv'\\)/d" \
              -e "/opencvProject/d" \
              app/build.gradle || true

            sed -i "/implementation[[:space:]]*['\"]com\.quickbirdstudios:opencv:.*['\"]/d" app/build.gradle
            sed -i "/implementation[[:space:]]*files(['\"]libs\/opencv.*['\"])/d" app/build.gradle || true
          fi

      - name: Download OpenCV SDK and inject sources + resources + native libs into app
        working-directory: ${{ steps.unzip.outputs.root_dir }}
        run: |
          set -euo pipefail

          curl -fL "https://github.com/opencv/opencv/releases/download/4.13.0/opencv-4.13.0-android-sdk.zip" -o opencv.zip
          rm -rf /tmp/opencv
          mkdir -p /tmp/opencv
          unzip -q opencv.zip -d /tmp/opencv

          OPENCV_SDK="$(find /tmp/opencv -maxdepth 6 -type d -path '*/OpenCV-android-sdk/sdk' -print -quit)"
          if [ -z "${OPENCV_SDK:-}" ]; then
            echo "Không tìm thấy OpenCV-android-sdk/sdk trong zip"
            find /tmp/opencv -maxdepth 4 -type d -print || true
            exit 1
          fi

          SRC_DIR="$OPENCV_SDK/java/src"
          RES_DIR="$OPENCV_SDK/java/res"

          if [ ! -d "$SRC_DIR" ]; then
            echo "Không tìm thấy sdk/java/src"
            find "$OPENCV_SDK/java" -maxdepth 4 -type d -print || true
            exit 1
          fi

          if [ ! -d "$RES_DIR" ]; then
            echo "Không tìm thấy sdk/java/res"
            find "$OPENCV_SDK/java" -maxdepth 4 -type d -print || true
            exit 1
          fi

          if [ ! -d "$OPENCV_SDK/native/libs" ]; then
            echo "Không tìm thấy sdk/native/libs"
            find "$OPENCV_SDK/native" -maxdepth 4 -type d -print || true
            exit 1
          fi

          mkdir -p app/src/main/java
          mkdir -p app/src/main/res
          mkdir -p app/src/main/jniLibs

          rsync -a "$SRC_DIR/" app/src/main/java/
          rsync -a "$RES_DIR/" app/src/main/res/
          rsync -a "$OPENCV_SDK/native/libs/" app/src/main/jniLibs/

          APP_PKG="$(sed -n 's/.*package="\([^"]*\)".*/\1/p' app/src/main/AndroidManifest.xml | head -n 1)"
          if [ -z "${APP_PKG:-}" ]; then
            echo "Không đọc được package từ app/src/main/AndroidManifest.xml"
            exit 1
          fi

          grep -rl "org.opencv.R" app/src/main/java/org/opencv/android | xargs -r sed -i "s/org\.opencv\.R/${APP_PKG}.R/g"
          grep -rl "org.opencv.BuildConfig" app/src/main/java/org/opencv/android | xargs -r sed -i "s/org\.opencv\.BuildConfig/${APP_PKG}.BuildConfig/g"

      - name: Fix gradle.properties (AndroidX)
        working-directory: ${{ steps.unzip.outputs.root_dir }}
        run: |
          set -euo pipefail
          touch gradle.properties

          sed -i \
            -e '/^android\.useAndroidX=/d' \
            -e '/^android\.enableJetifier=/d' \
            -e '/^android\.suppressUnsupportedCompileSdk=/d' \
            gradle.properties

          printf '\n' >> gradle.properties
          {
            echo 'android.useAndroidX=true'
            echo 'android.enableJetifier=true'
            echo 'android.suppressUnsupportedCompileSdk=33'
          } >> gradle.properties

      - name: Fix XML files – remove BOM and leading blank lines
        working-directory: ${{ steps.unzip.outputs.root_dir }}
        run: |
          find app/src/main/res -type f -name "*.xml" -exec perl -i -0777 -pe '
            s/^\xEF\xBB\xBF//;
            s/\A\s*//;
            s/\A(<\?xml\b[^>]*\?>\s*)//i;
            $_ = "<?xml version=\"1.0\" encoding=\"utf-8\"?>\n" . $_ if /\A(?!<\?xml)/;
          ' {} \;

      - name: Fix Java – bad operand type int for !
        working-directory: ${{ steps.unzip.outputs.root_dir }}
        run: |
          sed -i "s/!Shizuku\.checkSelfPermission()/Shizuku.checkSelfPermission() != 0/g" app/src/main/java/com/assistive/filter/FullRedModeService.java

      - name: Fix Java – import and create SystemTunerService if missing
        working-directory: ${{ steps.unzip.outputs.root_dir }}
        run: |
          FILE="app/src/main/java/com/assistive/filter/MainActivity.java"
          if [ -f "$FILE" ]; then
            if ! grep -q "import com.assistive.filter.SystemTunerService;" "$FILE"; then
              sed -i "/^package/a import com.assistive.filter.SystemTunerService;" "$FILE"
            fi
          fi
          STUB="app/src/main/java/com/assistive/filter/SystemTunerService.java"
          if [ ! -f "$STUB" ]; then
            mkdir -p "$(dirname "$STUB")"
            echo "package com.assistive.filter;" > "$STUB"
            echo "public class SystemTunerService extends android.app.Service {" >> "$STUB"
            echo "  public android.os.IBinder onBind(android.content.Intent intent) { return null; }" >> "$STUB"
            echo "}" >> "$STUB"
          fi

      - name: Create AimController.java with aiming algorithm
        working-directory: ${{ steps.unzip.outputs.root_dir }}
        run: |
          mkdir -p app/src/main/java/com/assistive/filter
          cat > app/src/main/java/com/assistive/filter/AimController.java <<'EOF'
          package com.assistive.filter;

          import android.util.Log;
          import java.io.IOException;

          public class AimController {
              private static final String TAG = "AimController";

              /**
               * Compute swipe velocity components (pixel/giay).
               * @param enemyState 0 = dung yen, 1 = di bo, 2 = chay
               * @param enemyDirection 1 = phai, -1 = trai, 0 = dung yen
               * @param deltaY khoang cach tu bung len dau (25px neu dung, 24px neu chay)
               * @return [Vx, Vy] pixel per second
               */
              public static float[] computeSwipeVelocity(int enemyState, int enemyDirection, int deltaY) {
                  float Vx, Vy;
                  Vy = 7550f + 10f * deltaY;
                  int enemySpeed;
                  switch (enemyState) {
                      case 2: enemySpeed = 26; break;
                      case 1: enemySpeed = 18; break;
                      default: enemySpeed = 0;
                  }
                  Vx = enemyDirection * enemySpeed * 10f;
                  return new float[]{Vx, Vy};
              }

              /**
               * Perform a swipe gesture with calculated velocity.
               * Requires root or Shizuku permission.
               * @param durationMs 100ms golden window
               * @param Vx horizontal velocity
               * @param Vy vertical velocity (upward = negative)
               * @param startX, startY initial touch coordinates (e.g., fire button position)
               */
              public static void performAimSwipe(int durationMs, float Vx, float Vy, float startX, float startY) {
                  float endX = startX + Vx * (durationMs / 1000f);
                  float endY = startY - Vy * (durationMs / 1000f); // subtract because screen coordinate Y increases downward

                  String cmd = "input swipe " + (int)startX + " " + (int)startY + " "
                          + (int)endX + " " + (int)endY + " " + durationMs;

                  try {
                      // With Shizuku
                      Process p = Runtime.getRuntime().exec(new String[]{"su", "-c", cmd});
                      p.waitFor();
                      Log.d(TAG, "Aim swipe executed");
                  } catch (Exception e) {
                      Log.e(TAG, "Swipe failed", e);
                  }
              }

              /**
               * Apply system optimizations for touch, DPI, animations, DNS, etc.
               * Requires root/Shizuku.
               */
              public static void applySystemOptimizations() {
                  String[] commands = {
                      "settings put system peak_refresh_rate 120",
                      "settings put system min_refresh_rate 120",
                      "settings put global window_animation_scale 0",
                      "settings put global transition_animation_scale 0",
                      "settings put global animator_duration_scale 0",
                      "settings put system pointer_speed 7",
                      "settings put system view.touch_slop 0",
                      "settings put global private_dns_mode hostname",
                      "settings put global private_dns_specifier 1.1.1.1.cloudflare-dns.com",
                      "wm size 720x1600",   // optional, may be removed if it causes UI issues
                      "wm density 560"       // adjust DPI
                  };

                  for (String cmd : commands) {
                      try {
                          Runtime.getRuntime().exec(new String[]{"su", "-c", cmd});
                      } catch (IOException ignored) {
                          Log.w(TAG, "Failed to run: " + cmd);
                      }
                  }
              }
          }
          EOF

      - name: Download Gradle 7.0.2
        id: gradle
        run: |
          set -euo pipefail
          VER="7.0.2"
          URL="https://services.gradle.org/distributions/gradle-${VER}-bin.zip"
          curl -L "$URL" -o gradle.zip
          rm -rf /tmp/gradle-dist
          mkdir -p /tmp/gradle-dist
          unzip -q gradle.zip -d /tmp/gradle-dist
          GRADLE_BIN="$(find /tmp/gradle-dist -maxdepth 3 -type f -path '*/bin/gradle' -print -quit)"
          chmod +x "$GRADLE_BIN"
          echo "gradle_bin=$GRADLE_BIN" >> "$GITHUB_OUTPUT"

      - name: Build debug APK (force repos, no wrapper)
        working-directory: ${{ steps.unzip.outputs.root_dir }}
        run: |
          set -euo pipefail

          rm -f local.properties
          echo "sdk.dir=$ANDROID_HOME" > local.properties

          cat > /tmp/init.gradle <<'EOF'
          gradle.beforeProject { p ->
            p.buildscript.repositories.clear()
            p.buildscript.repositories {
              google()
              mavenCentral()
              maven { url "https://jitpack.io" }
            }
            p.repositories.clear()
            p.repositories {
              google()
              mavenCentral()
              maven { url "https://jitpack.io" }
            }
          }
          EOF

          set -o pipefail
          "${{ steps.gradle.outputs.gradle_bin }}" -I /tmp/init.gradle --no-daemon --stacktrace --info ":app:assembleDebug" 2>&1 | tee /tmp/gradle_build.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          path: /tmp/gradle_build.log

      - name: Find APK
        id: find_apk
        run: |
          set -euo pipefail
          APK="$(find project -type f -name '*.apk' -path '*/build/outputs/apk/*' -print -quit)"
          if [ -z "${APK:-}" ]; then
            echo "Không tìm thấy APK"
            find project -type f -name '*.apk' -print || true
            exit 1
          fi
          echo "apk_path=$APK" >> "$GITHUB_OUTPUT"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: ${{ steps.find_apk.outputs.apk_path }}
