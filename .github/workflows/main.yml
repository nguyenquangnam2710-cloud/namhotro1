name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create settings.gradle
        run: |
          echo "include ':app'" > settings.gradle
          echo "rootProject.name = \"namhotro1\"" >> settings.gradle

      - name: Create build.gradle (root)
        run: |
          echo "buildscript {" > build.gradle
          echo "    ext.build_gradle_version = '7.0.2'" >> build.gradle
          echo "    repositories {" >> build.gradle
          echo "        google()" >> build.gradle
          echo "        mavenCentral()" >> build.gradle
          echo "    }" >> build.gradle
          echo "    dependencies {" >> build.gradle
          echo "        classpath \"com.android.tools.build:gradle:\$build_gradle_version\"" >> build.gradle
          echo "    }" >> build.gradle
          echo "}" >> build.gradle
          echo "allprojects {" >> build.gradle
          echo "    repositories {" >> build.gradle
          echo "        google()" >> build.gradle
          echo "        mavenCentral()" >> build.gradle
          echo "    }" >> build.gradle
          echo "}" >> build.gradle
          echo "task clean(type: Delete) {" >> build.gradle
          echo "    delete rootProject.buildDir" >> build.gradle
          echo "}" >> build.gradle

      - name: Create gradle.properties
        run: |
          echo "org.gradle.jvmargs=-Xmx2048m" > gradle.properties
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties

      - name: Create app/build.gradle
        run: |
          mkdir -p app
          echo "plugins {" > app/build.gradle
          echo "    id 'com.android.application'" >> app/build.gradle
          echo "}" >> app/build.gradle
          echo "android {" >> app/build.gradle
          echo "    namespace 'com.example.application2'" >> app/build.gradle
          echo "    compileSdk 34" >> app/build.gradle
          echo "    defaultConfig {" >> app/build.gradle
          echo "        applicationId \"com.example.application2\"" >> app/build.gradle
          echo "        minSdk 21" >> app/build.gradle
          echo "        targetSdk 34" >> app/build.gradle
          echo "        versionCode 1" >> app/build.gradle
          echo "        versionName \"1.0\"" >> app/build.gradle
          echo "    }" >> app/build.gradle
          echo "    buildTypes {" >> app/build.gradle
          echo "        release {" >> app/build.gradle
          echo "            minifyEnabled false" >> app/build.gradle
          echo "        }" >> app/build.gradle
          echo "    }" >> app/build.gradle
          echo "    compileOptions {" >> app/build.gradle
          echo "        sourceCompatibility JavaVersion.VERSION_1_8" >> app/build.gradle
          echo "        targetCompatibility JavaVersion.VERSION_1_8" >> app/build.gradle
          echo "    }" >> app/build.gradle
          echo "}" >> app/build.gradle
          echo "dependencies {" >> app/build.gradle
          echo "    implementation 'androidx.appcompat:appcompat:1.5.1'" >> app/build.gradle
          echo "}" >> app/build.gradle

      - name: Create gradle wrapper
        run: |
          mkdir -p gradle/wrapper
          echo "distributionBase=GRADLE_USER_HOME" > gradle/wrapper/gradle-wrapper.properties
          echo "distributionPath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
          echo "distributionUrl=https\\://services.gradle.org/distributions/gradle-7.2-bin.zip" >> gradle/wrapper/gradle-wrapper.properties
          echo "zipStoreBase=GRADLE_USER_HOME" >> gradle/wrapper/gradle-wrapper.properties
          echo "zipStorePath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
          curl -L https://raw.githubusercontent.com/gradle/gradle/v7.2.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          echo '#!/bin/sh' > gradlew
          echo 'JAVA_HOME=${JAVA_HOME:-/usr/lib/jvm/java-17-openjdk-amd64}' >> gradlew
          echo 'APP_HOME=$(pwd)' >> gradlew
          echo 'CLASSPATH=$APP_HOME/gradle/wrapper/gradle-wrapper.jar' >> gradlew
          echo 'exec java -classpath "$CLASSPATH" org.gradle.wrapper.GradleWrapperMain "$@"' >> gradlew
          chmod +x gradlew

      - name: Build APK
        id: build
        continue-on-error: true
        run: |
          ./gradlew assembleDebug 2>&1 | tee full_log.txt
          if [ ${PIPESTATUS[0]} -eq 0 ]; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failed" >> $GITHUB_OUTPUT
          fi

      - name: Upload APK (if success)
        if: steps.build.outputs.status == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload error log (if failed)
        if: steps.build.outputs.status == 'failed'
        uses: actions/upload-artifact@v4
        with:
          name: error-log
          path: full_log.txt
