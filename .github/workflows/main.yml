name: aimlock

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Ensure correct project structure
        run: |
          # Tạo thư mục app nếu chưa có
          mkdir -p app/src/main
          mkdir -p app/src/main/java/com/example/application2
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/xml

          # Tạo settings.gradle nếu thiếu hoặc sai
          if [ ! -f settings.gradle ] || ! grep -q "include ':app'" settings.gradle; then
            echo "include ':app'" > settings.gradle
            echo "rootProject.name = \"namhotro1\"" >> settings.gradle
          fi

          # Tạo build.gradle root nếu thiếu
          if [ ! -f build.gradle ]; then
            cat > build.gradle << 'EOF'
        buildscript {
            ext.build_gradle_version = '7.0.2'
            repositories {
                google()
                mavenCentral()
            }
            dependencies {
                classpath "com.android.tools.build:gradle:$build_gradle_version"
            }
        }
        allprojects {
            repositories {
                google()
                mavenCentral()
            }
        }
        task clean(type: Delete) {
            delete rootProject.buildDir
        }
        EOF
          fi

          # Tạo app/build.gradle nếu thiếu
          if [ ! -f app/build.gradle ]; then
            cat > app/build.gradle << 'EOF'
        plugins {
            id 'com.android.application'
        }
        android {
            namespace 'com.example.application2'
            compileSdk 34
            defaultConfig {
                applicationId "com.example.application2"
                minSdk 21
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }
            buildTypes {
                release {
                    minifyEnabled false
                }
            }
            compileOptions {
                sourceCompatibility JavaVersion.VERSION_1_8
                targetCompatibility JavaVersion.VERSION_1_8
            }
        }
        dependencies {
            implementation 'androidx.appcompat:appcompat:1.5.1'
        }
        EOF
          fi

          # Tạo gradle.properties nếu thiếu
          if [ ! -f gradle.properties ]; then
            echo "org.gradle.jvmargs=-Xmx2048m" > gradle.properties
            echo "android.useAndroidX=true" >> gradle.properties
            echo "android.enableJetifier=true" >> gradle.properties
          fi

      - name: Create gradle wrapper
        run: |
          mkdir -p gradle/wrapper
          echo "distributionBase=GRADLE_USER_HOME" > gradle/wrapper/gradle-wrapper.properties
          echo "distributionPath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
          echo "distributionUrl=https\\://services.gradle.org/distributions/gradle-7.2-bin.zip" >> gradle/wrapper/gradle-wrapper.properties
          echo "zipStoreBase=GRADLE_USER_HOME" >> gradle/wrapper/gradle-wrapper.properties
          echo "zipStorePath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
          curl -L https://raw.githubusercontent.com/gradle/gradle/v7.2.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          echo '#!/bin/sh' > gradlew
          echo 'JAVA_HOME=${JAVA_HOME:-/usr/lib/jvm/java-17-openjdk-amd64}' >> gradlew
          echo 'APP_HOME=$(pwd)' >> gradlew
          echo 'CLASSPATH=$APP_HOME/gradle/wrapper/gradle-wrapper.jar' >> gradlew
          echo 'exec java -classpath "$CLASSPATH" org.gradle.wrapper.GradleWrapperMain "$@"' >> gradlew
          chmod +x gradlew

      - name: Build APK
        id: build
        continue-on-error: true
        run: |
          ./gradlew assembleDebug 2>&1 | tee full_log.txt
          if [ ${PIPESTATUS[0]} -eq 0 ]; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failed" >> $GITHUB_OUTPUT
          fi

      - name: Upload APK (if success)
        if: steps.build.outputs.status == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload error log (if failed)
        if: steps.build.outputs.status == 'failed'
        uses: actions/upload-artifact@v4
        with:
          name: error-log
          path: full_log.txt
