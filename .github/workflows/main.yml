name: Ultimate Build (All-in-One)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Unzip source
        run: |
          for f in *.zip; do
            if [ -f "$f" ]; then
              unzip -q "$f" -d .
              break
            fi
          done

      - name: Fix 34x in ALL files
        run: |
          find . -type f -exec sed -i 's/34x/31/g' {} \;
          find . -type f -exec sed -i 's/34X/31/g' {} \;
          find . -type f -exec sed -i "s/'34x'/'31'/g" {} \;
          find . -type f -exec sed -i 's/"34x"/"31"/g' {} \;

      - name: Attempt build with AGP 8.0.0 + compileSdk 31
        id: build1
        continue-on-error: true
        run: |
          cat > app/build.gradle <<'EOF'
          plugins { id 'com.android.application' }
          android { compileSdk 31; defaultConfig { applicationId "com.example.application2"; minSdk 21; targetSdk 31; versionCode 1; versionName "1.0" } }
          EOF
          mkdir -p gradle/wrapper
          echo "distributionUrl=https\\://services.gradle.org/distributions/gradle-8.0-bin.zip" > gradle/wrapper/gradle-wrapper.properties
          curl -L https://raw.githubusercontent.com/gradle/gradle/v8.0.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          echo '#!/bin/sh' > gradlew; echo 'exec java -classpath $0/../gradle/wrapper/gradle-wrapper.jar org.gradle.wrapper.GradleWrapperMain "$@"' >> gradlew; chmod +x gradlew
          ./gradlew assembleDebug 2>&1 | tee log1.txt
          if [ ${PIPESTATUS[0]} -eq 0 ]; then echo "status=success" >> $GITHUB_OUTPUT; else echo "status=failed" >> $GITHUB_OUTPUT; fi

      - name: If failed, try AGP 7.0.2 + compileSdk 31
        if: steps.build1.outputs.status == 'failed'
        id: build2
        continue-on-error: true
        run: |
          cat > build.gradle <<'EOF'
          buildscript { repositories { google(); mavenCentral() } dependencies { classpath 'com.android.tools.build:gradle:7.0.2' } }
          EOF
          cat > app/build.gradle <<'EOF'
          plugins { id 'com.android.application' }
          android { compileSdk 31; defaultConfig { applicationId "com.example.application2"; minSdk 21; targetSdk 31; versionCode 1; versionName "1.0" } }
          EOF
          echo "distributionUrl=https\\://services.gradle.org/distributions/gradle-7.2-bin.zip" > gradle/wrapper/gradle-wrapper.properties
          curl -L https://raw.githubusercontent.com/gradle/gradle/v7.2.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          ./gradlew assembleDebug 2>&1 | tee log2.txt
          if [ ${PIPESTATUS[0]} -eq 0 ]; then echo "status=success" >> $GITHUB_OUTPUT; else echo "status=failed" >> $GITHUB_OUTPUT; fi

      - name: If still failed, create manual guide
        if: steps.build2.outputs.status == 'failed'
        run: |
          cat > GUIDE.txt <<'EOF'
          🛠️ Tất cả các workflow tự động đều thất bại. Hãy làm theo hướng dẫn này để build thủ công trên GitHub Codespaces (chắc chắn thành công):
          1. Truy cập repository của bạn trên GitHub.
          2. Bấm nút Code (xanh) -> Codespaces -> Create codespace on main.
          3. Đợi môi trường khởi tạo (khoảng 2 phút).
          4. Mở terminal (Terminal -> New Terminal).
          5. Chạy lệnh: chmod +x gradlew
          6. Chạy lệnh: ./gradlew assembleDebug
          7. Nếu lỗi, sửa file app/build.gradle (thay compileSdk 34x thành 31) và chạy lại bước 6.
          8. APK nằm ở: app/build/outputs/apk/debug/app-debug.apk (click chuột phải -> Download).
          Nếu vẫn không được, copy lỗi và gửi cho tôi.
          EOF

      - name: Upload APK (if any success)
        if: steps.build1.outputs.status == 'success' || steps.build2.outputs.status == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: AimLock-Signed
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload log (if failed)
        if: steps.build1.outputs.status == 'failed' && steps.build2.outputs.status == 'failed'
        uses: actions/upload-artifact@v4
        with:
          name: error-logs
          path: log*.txt

      - name: Upload manual guide (if all failed)
        if: steps.build2.outputs.status == 'failed'
        uses: actions/upload-artifact@v4
        with:
          name: manual-guide
          path: GUIDE.txt
