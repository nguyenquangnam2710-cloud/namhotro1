name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create gradle wrapper files
        run: |
          mkdir -p gradle/wrapper
          echo "distributionBase=GRADLE_USER_HOME" > gradle/wrapper/gradle-wrapper.properties
          echo "distributionPath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
          echo "distributionUrl=https\\://services.gradle.org/distributions/gradle-7.2-bin.zip" >> gradle/wrapper/gradle-wrapper.properties
          echo "zipStoreBase=GRADLE_USER_HOME" >> gradle/wrapper/gradle-wrapper.properties
          echo "zipStorePath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties

      - name: Download gradle-wrapper.jar
        run: |
          curl -L https://raw.githubusercontent.com/gradle/gradle/v7.2.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar

      - name: Create gradlew script
        run: |
          echo '#!/bin/sh' > gradlew
          echo 'JAVA_HOME=${JAVA_HOME:-/usr/lib/jvm/java-17-openjdk-amd64}' >> gradlew
          echo 'APP_HOME=$(pwd)' >> gradlew
          echo 'CLASSPATH=$APP_HOME/gradle/wrapper/gradle-wrapper.jar' >> gradlew
          echo 'exec java -classpath "$CLASSPATH" org.gradle.wrapper.GradleWrapperMain "$@"' >> gradlew
          chmod +x gradlew

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build APK
        id: build
        continue-on-error: true
        run: |
          ./gradlew assembleDebug 2>&1 | tee build_log.txt
          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo "BUILD_FAILED=true" >> $GITHUB_ENV
          else
            echo "BUILD_FAILED=false" >> $GITHUB_ENV
          fi

      - name: Compress error log
        if: env.BUILD_FAILED == 'true'
        run: |
          echo "=== BUILD FAILURE LOG ===" > error_log.txt
          echo "" >> error_log.txt
          cat build_log.txt >> error_log.txt
          zip error_log.zip error_log.txt

      - name: Upload APK (if success)
        if: env.BUILD_FAILED == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload error log (if failed)
        if: env.BUILD_FAILED == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: error-log
          path: error_log.zip
