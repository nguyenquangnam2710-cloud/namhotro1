name: Build Signed APK (Overwrite All)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Unzip source if present
        run: |
          for f in *.zip; do
            if [ -f "$f" ]; then
              echo "✅ Giải nén $f"
              unzip -q "$f" -d .
              break
            fi
          done

      - name: Clean old build files
        run: |
          rm -rf app/build
          rm -rf app/.gradle
          rm -rf .gradle
          rm -f app/build.gradle
          rm -f build.gradle
          rm -f settings.gradle
          rm -f gradle.properties

      - name: Create ALL build files from scratch
        run: |
          # settings.gradle
          cat > settings.gradle <<'EOF'
          include ':app'
          rootProject.name = "AimLock"
          EOF

          # build.gradle (root)
          cat > build.gradle <<'EOF'
          buildscript {
              ext.build_gradle_version = '7.0.2'
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath "com.android.tools.build:gradle:$build_gradle_version"
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          task clean(type: Delete) {
              delete rootProject.buildDir
          }
          EOF

          # gradle.properties
          cat > gradle.properties <<'EOF'
          org.gradle.jvmargs=-Xmx2048m
          android.useAndroidX=true
          android.enableJetifier=true
          android.suppressUnsupportedCompileSdk=33
          EOF

          # app/build.gradle (dùng compileSdk 33)
          mkdir -p app
          cat > app/build.gradle <<'EOF'
          plugins {
              id 'com.android.application'
          }
          android {
              namespace 'com.example.application2'
              compileSdk 33
              defaultConfig {
                  applicationId "com.example.application2"
                  minSdk 21
                  targetSdk 33
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes {
                  release {
                      minifyEnabled false
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
              signingConfigs {
                  debug {
                      storeFile file("debug.keystore")
                      storePassword "android"
                      keyAlias "debug"
                      keyPassword "android"
                  }
              }
              buildTypes {
                  debug {
                      signingConfig signingConfigs.debug
                  }
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.startup:startup-runtime:1.1.1'
              implementation 'androidx.lifecycle:lifecycle-runtime:2.6.1'
          }
          EOF

          # Tạo debug keystore
          keytool -genkey -v -keystore app/debug.keystore -alias debug -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Debug, OU=Debug, O=Debug, L=Debug, ST=Debug, C=Debug"

      - name: Fix AndroidManifest.xml
        run: |
          if [ -f app/src/main/AndroidManifest.xml ]; then
            # Thêm provider nếu chưa có
            if ! grep -q "androidx.startup.InitializationProvider" app/src/main/AndroidManifest.xml; then
              sed -i '/<\/application>/i \
        <provider\
            android:name="androidx.startup.InitializationProvider"\
            android:authorities="${applicationId}.androidx-startup"\
            android:exported="false"\
            tools:node="merge">\
            <meta-data\
                android:name="androidx.lifecycle.ProcessLifecycleInitializer"\
                android:value="androidx.startup" />\
        </provider>' app/src/main/AndroidManifest.xml
            fi
            # Đảm bảo có xmlns:tools nếu chưa có
            if ! grep -q "xmlns:tools" app/src/main/AndroidManifest.xml; then
              sed -i 's/<manifest /<manifest xmlns:tools="http:\/\/schemas.android.com\/tools" /' app/src/main/AndroidManifest.xml
            fi
          else
            mkdir -p app/src/main
            cat > app/src/main/AndroidManifest.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:tools="http://schemas.android.com/tools"
              package="com.example.application2">
              <application
                  android:allowBackup="true"
                  android:icon="@android:drawable/sym_def_app_icon"
                  android:label="@string/app_name"
                  android:theme="@style/Theme.AppCompat.Light">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  <service
                      android:name=".AimLockService"
                      android:permission="android.permission.BIND_ACCESSIBILITY_SERVICE"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.accessibilityservice.AccessibilityService" />
                      </intent-filter>
                      <meta-data
                          android:name="android.accessibilityservice"
                          android:resource="@xml/accessibility_service_config" />
                  </service>
                  <provider
                      android:name="androidx.startup.InitializationProvider"
                      android:authorities="${applicationId}.androidx-startup"
                      android:exported="false"
                      tools:node="merge">
                      <meta-data
                          android:name="androidx.lifecycle.ProcessLifecycleInitializer"
                          android:value="androidx.startup" />
                  </provider>
              </application>
          </manifest>
          EOF
          fi

      - name: Create gradle wrapper
        run: |
          mkdir -p gradle/wrapper
          echo "distributionBase=GRADLE_USER_HOME" > gradle/wrapper/gradle-wrapper.properties
          echo "distributionPath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
          echo "distributionUrl=https\\://services.gradle.org/distributions/gradle-7.2-bin.zip" >> gradle/wrapper/gradle-wrapper.properties
          echo "zipStoreBase=GRADLE_USER_HOME" >> gradle/wrapper/gradle-wrapper.properties
          echo "zipStorePath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
          curl -L https://raw.githubusercontent.com/gradle/gradle/v7.2.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          echo '#!/bin/sh' > gradlew
          echo 'JAVA_HOME=${JAVA_HOME:-/usr/lib/jvm/java-17-openjdk-amd64}' >> gradlew
          echo 'APP_HOME=$(pwd)' >> gradlew
          echo 'CLASSPATH=$APP_HOME/gradle/wrapper/gradle-wrapper.jar' >> gradlew
          echo 'exec java -classpath "$CLASSPATH" org.gradle.wrapper.GradleWrapperMain "$@"' >> gradlew
          chmod +x gradlew

      - name: Build APK
        id: build
        continue-on-error: true
        run: |
          ./gradlew assembleDebug 2>&1 | tee full_log.txt
          if [ ${PIPESTATUS[0]} -eq 0 ]; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failed" >> $GITHUB_OUTPUT
          fi

      - name: Upload APK
        if: steps.build.outputs.status == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: AimLock-Signed
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Error Log
        if: steps.build.outputs.status == 'failed'
        uses: actions/upload-artifact@v4
        with:
          name: error-log
          path: full_log.txt
