name: Build APK (Fix direct)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Unzip source
        run: |
          for f in *.zip; do
            if [ -f "$f" ]; then
              unzip -q "$f" -d .
              break
            fi
          done

      - name: Fix all build.gradle and gradle.properties (replace 34 -> 31)
        run: |
          # Tìm và thay thế tất cả compileSdk, targetSdk, minSdk (nếu có)
          find . -name "*.gradle" -exec sed -i 's/compileSdk 34/compileSdk 31/g' {} \;
          find . -name "*.gradle" -exec sed -i 's/compileSdk 34x/compileSdk 31/g' {} \;
          find . -name "*.gradle" -exec sed -i 's/targetSdk 34/targetSdk 31/g' {} \;
          find . -name "*.gradle" -exec sed -i 's/targetSdk 34x/targetSdk 31/g' {} \;
          find . -name "*.properties" -exec sed -i 's/34/31/g' {} \;

          # Đảm bảo app/build.gradle tồn tại
          if [ -f app/build.gradle ]; then
            echo "✅ Đã sửa app/build.gradle"
          else
            echo "⚠️ Không tìm thấy app/build.gradle"
          fi

      - name: Create gradle wrapper
        run: |
          mkdir -p gradle/wrapper
          echo "distributionBase=GRADLE_USER_HOME" > gradle/wrapper/gradle-wrapper.properties
          echo "distributionPath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
          echo "distributionUrl=https\\://services.gradle.org/distributions/gradle-7.2-bin.zip" >> gradle/wrapper/gradle-wrapper.properties
          echo "zipStoreBase=GRADLE_USER_HOME" >> gradle/wrapper/gradle-wrapper.properties
          echo "zipStorePath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
          curl -L https://raw.githubusercontent.com/gradle/gradle/v7.2.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          echo '#!/bin/sh' > gradlew
          echo 'JAVA_HOME=${JAVA_HOME:-/usr/lib/jvm/java-17-openjdk-amd64}' >> gradlew
          echo 'APP_HOME=$(pwd)' >> gradlew
          echo 'CLASSPATH=$APP_HOME/gradle/wrapper/gradle-wrapper.jar' >> gradlew
          echo 'exec java -classpath "$CLASSPATH" org.gradle.wrapper.GradleWrapperMain "$@"' >> gradlew
          chmod +x gradlew

      - name: Build APK
        id: build
        continue-on-error: true
        run: |
          ./gradlew assembleDebug 2>&1 | tee log.txt
          echo "status=$([ ${PIPESTATUS[0]} -eq 0 ] && echo success || echo failed)" >> $GITHUB_OUTPUT

      - name: Upload APK
        if: steps.build.outputs.status == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: AimLock-Signed
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload log
        if: steps.build.outputs.status == 'failed'
        uses: actions/upload-artifact@v4
        with:
          name: error-log
          path: log.txt
