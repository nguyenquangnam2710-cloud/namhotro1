name: Build APK with Full Log

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create gradle wrapper files
        run: |
          mkdir -p gradle/wrapper
          echo "distributionBase=GRADLE_USER_HOME" > gradle/wrapper/gradle-wrapper.properties
          echo "distributionPath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
          echo "distributionUrl=https\\://services.gradle.org/distributions/gradle-7.2-bin.zip" >> gradle/wrapper/gradle-wrapper.properties
          echo "zipStoreBase=GRADLE_USER_HOME" >> gradle/wrapper/gradle-wrapper.properties
          echo "zipStorePath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties

      - name: Download gradle-wrapper.jar
        run: |
          curl -L https://raw.githubusercontent.com/gradle/gradle/v7.2.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar

      - name: Create gradlew script
        run: |
          echo '#!/bin/sh' > gradlew
          echo 'JAVA_HOME=${JAVA_HOME:-/usr/lib/jvm/java-17-openjdk-amd64}' >> gradlew
          echo 'APP_HOME=$(pwd)' >> gradlew
          echo 'CLASSPATH=$APP_HOME/gradle/wrapper/gradle-wrapper.jar' >> gradlew
          echo 'exec java -classpath "$CLASSPATH" org.gradle.wrapper.GradleWrapperMain "$@"' >> gradlew
          chmod +x gradlew

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build APK and capture full log
        id: build
        continue-on-error: true
        run: |
          ./gradlew assembleDebug 2>&1 | tee full_build_log.txt
          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo "BUILD_STATUS=failed" >> $GITHUB_ENV
          else
            echo "BUILD_STATUS=success" >> $GITHUB_ENV
          fi

      - name: Create detailed error report (if failed)
        if: env.BUILD_STATUS == 'failed'
        run: |
          echo "==============================" > error_report.txt
          echo "     BUILD FAILURE REPORT     " >> error_report.txt
          echo "==============================" >> error_report.txt
          echo "" >> error_report.txt
          echo "Timestamp: $(date)" >> error_report.txt
          echo "Repository: ${{ github.repository }}" >> error_report.txt
          echo "Branch: ${{ github.ref_name }}" >> error_report.txt
          echo "Commit: ${{ github.sha }}" >> error_report.txt
          echo "" >> error_report.txt
          echo "--- FULL BUILD LOG ---" >> error_report.txt
          echo "" >> error_report.txt
          cat full_build_log.txt >> error_report.txt
          echo "" >> error_report.txt
          echo "--- END OF LOG ---" >> error_report.txt
          zip -9 error_report.zip error_report.txt full_build_log.txt

      - name: Upload APK (if success)
        if: env.BUILD_STATUS == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Upload error report (if failed)
        if: env.BUILD_STATUS == 'failed'
        uses: actions/upload-artifact@v4
        with:
          name: error-report
          path: error_report.zip
          if-no-files-found: error

      - name: Final status message
        run: |
          if [ "${{ env.BUILD_STATUS }}" == "success" ]; then
            echo "✅ BUILD SUCCESSFUL! APK uploaded."
          else
            echo "❌ BUILD FAILED! Check error-report artifact for details."
          fi
